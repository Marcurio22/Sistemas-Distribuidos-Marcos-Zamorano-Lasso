services:
  mysql-db:
    image: mysql:8.0
    container_name: practica2-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: practica2db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uappuser", "-papppass"]
      interval: 10s
      timeout: 5s
      retries: 10

  python-api:
    build:
      context: ./python-api
    container_name: practica2-python
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql-db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: practica2db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "5000:5000"
    depends_on:
      mysql-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  spring-app:
    build:
      context: ./spring-app
    container_name: practica2-spring
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/practica2db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass
      APP_PYTHON_BASE_URL: http://python-api:5000
    ports:
      - "8081:8081"
    depends_on:
      mysql-db:
        condition: service_healthy
      python-api:
        condition: service_healthy