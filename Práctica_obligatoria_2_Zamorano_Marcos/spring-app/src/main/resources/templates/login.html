<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Práctica obligatoria 2</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="page-shell">
    <div class="container-card form-panel">
        <h1>Iniciar sesión</h1>
        <p class="subtitle">Acceso al entorno de pruebas de la práctica.</p>

        <div th:if="${param.error}" class="alert error">
            Usuario o contraseña incorrectos.
        </div>

        <div th:if="${param.logout}" class="alert success">
            Se ha cerrado la sesión correctamente.
        </div>

        <form method="post" th:action="@{/login}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label for="username">Usuario</label>
            <input id="username" name="username" type="text" required>

            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" required>

            <button class="primary-button" type="submit">Entrar</button>
        </form>

        <div class="demo-box">
            <strong>Usuario de prueba</strong><br>
            usuario: <code>marcos</code><br>
            contraseña: <code>marcos1234</code>
        </div>

        <div class="top-links">
            <a class="link-text" th:href="@{/}">← Volver a la página principal</a>
        </div>
    </div>
</div>
</body>
</html>
