<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="siteSidebar" class="sidebar-surface">
  <div class="flex items-center justify-between border-b border-primary-content/15 px-5 py-5">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.2em] text-primary-content/60">Práctica 2</p>
      <h2 class="mt-2 text-4xl font-extrabold">Menú</h2>
      <p class="mt-2 text-sm text-primary-content/75">
        Spring Boot + Flask + MySQL
      </p>
    </div>

    <label for="main-drawer"
           class="btn btn-ghost btn-circle btn-sm text-primary-content hover:bg-primary-content/10"
           aria-label="Cerrar menú">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </label>
  </div>

  <div class="flex flex-1 flex-col justify-between">
    <div class="px-4 py-4">
      <p class="sidebar-section-title">Navegación</p>
      <ul class="space-y-2">
        <li>
          <a th:href="@{/}"
             class="sidebar-nav-link"
             th:classappend="${currentPath == '/'} ? ' sidebar-nav-link-active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 10.5 12 3l9 7.5"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 9.75V21h13.5V9.75"/>
            </svg>
            <span>Inicio</span>
          </a>
        </li>

        <li>
          <a th:href="@{/lab}"
             class="sidebar-nav-link"
             th:classappend="${currentPath != null and currentPath.startsWith('/lab')} ? ' sidebar-nav-link-active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 3h6"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M10 3v6.5l-4.8 7.2A2 2 0 0 0 6.86 20h10.28a2 2 0 0 0 1.66-3.3L14 9.5V3"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 14h8"/>
            </svg>
            <span>Laboratorio</span>
          </a>
        </li>
      </ul>
    </div>

    <div class="mt-auto border-t border-primary-content/15 px-4 py-4">
      <p class="sidebar-section-title" th:if="${authenticated}">Sesión</p>
      <p class="sidebar-section-title" th:unless="${authenticated}">Acceso</p>

      <ul class="space-y-2">
        <li th:if="${authenticated}">
          <a th:href="@{/dashboard}"
             class="sidebar-nav-link"
             th:classappend="${currentPath == '/dashboard'} ? ' sidebar-nav-link-active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6.75a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 20.25a7.5 7.5 0 0 1 15 0"/>
            </svg>
            <span>Dashboard</span>
          </a>
        </li>

        <li th:unless="${authenticated}">
          <a th:href="@{/login}"
             class="sidebar-nav-link"
             th:classappend="${currentPath == '/login'} ? ' sidebar-nav-link-active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M18 12H9"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="m15 9 3 3-3 3"/>
            </svg>
            <span>Iniciar sesión</span>
          </a>
        </li>

        <li th:unless="${authenticated}">
          <a th:href="@{/register}"
             class="sidebar-nav-link"
             th:classappend="${currentPath == '/register'} ? ' sidebar-nav-link-active' : ''">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6.75a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 20.25a7.5 7.5 0 0 1 15 0"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25v6"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 11.25h6"/>
            </svg>
            <span>Crear cuenta</span>
          </a>
        </li>
      </ul>

      <div th:if="${authenticated}" class="mt-5">
        <form method="post" th:action="@{/logout}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button type="submit" class="btn btn-error btn-block justify-start rounded-2xl text-base font-bold">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M18 12H9"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="m15 9 3 3-3 3"/>
            </svg>
            <span>Cerrar sesión</span>
          </button>
        </form>
      </div>
    </div>
  </div>
</aside>
</body>
</html>
