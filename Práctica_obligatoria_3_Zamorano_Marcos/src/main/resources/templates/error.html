<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Error controlado')}"></head>
<body>
<main class="app-shell py-12">
    <section class="card plantio-card max-w-3xl mx-auto">
        <div class="card-body p-8 text-center">
            <img class="mx-auto h-20 w-20 object-contain" th:src="@{/images/burgos-cf-shield.png}" alt="Escudo Burgos CF">
            <p class="mt-3 text-sm font-black uppercase tracking-[.18em] text-plantio-emerald">Error controlado</p>
            <h1 class="mt-2 text-4xl font-black">Algo no ha ido como se esperaba</h1>
            <p class="mt-3 text-slate-600" th:if="${message}" th:text="${message}">
                La aplicación ha capturado un problema inesperado de forma controlada.
            </p>
            <p class="mt-3 text-slate-600" th:unless="${message}">
                La aplicación ha capturado un problema inesperado de forma controlada. Regresa al inicio para continuar navegando y vuelve a intentarlo.
            </p>
            <p class="mt-2 text-xs text-slate-400" th:if="${status}">
                Código <span th:text="${status}">500</span><span th:if="${path}"> · <span th:text="${path}">/ruta</span></span>
            </p>
            <div class="mt-6 flex flex-wrap justify-center gap-3">
                <a class="btn btn-primary" th:href="@{/}">Volver al inicio</a>
            </div>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
