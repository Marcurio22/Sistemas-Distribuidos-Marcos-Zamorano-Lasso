<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="app-shell py-10">
    <h1>Hola, <span th:text="${user.firstName}">usuario</span></h1>
    <p class="text-lg leading-8 text-slate-700">Tu zona privada con pedidos, entradas, notificaciones y acceso al asistente.</p>
    <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-4 mb-8">
        <div><a class="dashboard-tile" th:href="@{/my-tickets}">🎟️ Mis entradas</a></div>
        <div><a class="dashboard-tile" th:href="@{/orders}">🛒 Mis pedidos</a></div>
        <div><a class="dashboard-tile" th:href="@{/assistant}">🤖 Asistente IA</a></div>
        <div><a class="dashboard-tile" th:href="@{/chat}">💬 Muro</a></div>
    </div>
    <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        <div><div class="card plantio-card"><div class="card-body"><h2 class="text-2xl font-black">Últimos pedidos</h2><div th:each="order : ${orders}" class="border-b border-slate-200 py-2"><strong th:text="${order.paymentReference}"></strong> · <span th:text="${order.total} + ' €'"></span></div><p th:if="${#lists.isEmpty(orders)}" class="text-slate-500">Sin pedidos todavía.</p></div></div></div>
        <div><div class="card plantio-card"><div class="card-body"><h2 class="text-2xl font-black">Notificaciones</h2><div th:each="notification : ${notifications}" class="border-b border-slate-200 py-2"><strong th:text="${notification.title}"></strong><p class="mb-0" th:text="${notification.message}"></p></div><p th:if="${#lists.isEmpty(notifications)}" class="text-slate-500">Sin notificaciones.</p></div></div></div>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
