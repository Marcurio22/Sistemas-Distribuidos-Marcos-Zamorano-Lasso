<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Registro')}"></head>
<body class="auth-bg">
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="container py-5">
    <div class="row justify-content-center"><div class="col-md-6">
        <div class="card plantio-card"><div class="card-body p-4">
            <h1 class="h3 mb-3">Crear cuenta</h1>
            <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                <div class="row"><div class="col-md-6"><label class="form-label">Nombre</label><input class="form-control mb-3" th:field="*{firstName}" required></div>
                <div class="col-md-6"><label class="form-label">Apellidos</label><input class="form-control mb-3" th:field="*{lastName}" required></div></div>
                <label class="form-label">Email</label><input class="form-control mb-3" th:field="*{email}" type="email" required>
                <label class="form-label">Teléfono</label><input class="form-control mb-3" th:field="*{phone}">
                <label class="form-label">Contraseña</label><input class="form-control mb-3" th:field="*{password}" type="password" required>
                <button class="btn btn-warning w-100">Registrarme</button>
            </form>
        </div></div>
    </div></div>
</main>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
