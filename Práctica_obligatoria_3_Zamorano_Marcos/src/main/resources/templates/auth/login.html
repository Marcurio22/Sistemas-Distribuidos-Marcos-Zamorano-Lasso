<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Login')}"></head>
<body class="auth-bg">
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="container py-5">
    <div class="row justify-content-center"><div class="col-md-5">
        <div class="card plantio-card"><div class="card-body p-4">
            <h1 class="h3 mb-3">Acceso seguro</h1>
            <p class="text-muted">JWT stateless en cookie HttpOnly. Demo: admin@plantio360.local / admin1234</p>
            <form th:action="@{/login}" th:object="${loginRequest}" method="post">
                <label class="form-label">Email</label><input class="form-control mb-3" th:field="*{email}" type="email" required>
                <label class="form-label">Contraseña</label><input class="form-control mb-3" th:field="*{password}" type="password" required>
                <button class="btn btn-primary w-100">Entrar</button>
            </form>
        </div></div>
    </div></div>
</main>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
