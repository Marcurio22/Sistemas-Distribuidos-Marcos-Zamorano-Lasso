<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Asistente IA')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card plantio-card">
                <div class="card-body p-4">
                    <div class="section-title mb-4">
                        <div>
                            <span class="badge text-bg-primary mb-2">FAQ + Gemini</span>
                            <h1>🤖 Blanquinegro Bot</h1>
                            <p class="text-muted mb-0">Pregunta sobre entradas, estadio, tienda, partidos o servicios del día de partido.</p>
                        </div>
                    </div>

                    <div class="mb-4">
                        <h2 class="h5 mb-3">Preguntas frecuentes</h2>
                        <div th:if="${#lists.isEmpty(faqs)}" class="alert alert-info">No hay FAQs activas cargadas todavía.</div>
                        <div th:each="faq : ${faqs}" class="collapse collapse-arrow bg-base-200 mb-2">
                            <input type="checkbox"/>
                            <div class="collapse-title font-bold" th:text="${faq.question}">Pregunta frecuente</div>
                            <div class="collapse-content">
                                <p class="mb-3" th:text="${faq.answer}">Respuesta de la FAQ.</p>
                                <button type="button" class="btn btn-sm btn-outline-primary faq-question-button" th:data-question="${faq.question}">
                                    Usar esta pregunta
                                </button>
                            </div>
                        </div>
                    </div>

                    <form th:action="@{/assistant}" th:object="${assistantRequest}" method="post">
                        <label class="form-label" for="question">Pregunta</label>
                        <textarea id="question" class="form-control mb-3" th:field="*{question}" rows="4" placeholder="¿Dónde puedo aparcar?"></textarea>
                        <button class="btn btn-primary">Preguntar</button>
                    </form>

                    <div th:if="${response}" class="assistant-response mt-4">
                        <span class="badge text-bg-info" th:text="${response.source}">Fuente</span>
                        <p class="mt-2 mb-0" th:text="${response.answer}">Respuesta del asistente.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
