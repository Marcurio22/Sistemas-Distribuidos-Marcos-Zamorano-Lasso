<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Visor cartográfico')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="w-full px-4 py-4">
    <div class="app-shell mb-3">
        <div class="section-title"><div><h1>Visor cartográfico</h1><p class="text-slate-500 mb-0">Leaflet + OpenStreetMap. Sin API keys. Incluye puntos de interés y sensores simulados.</p></div>
        <form th:action="@{/sensors/sync}" method="post"><button class="btn btn-accent">Sincronizar sensores Flask</button></form></div>
    </div>
    <div id="plantioMap"></div>
    <div class="app-shell mt-4">
        <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
            <div><div class="card plantio-card"><div class="card-body"><h2 class="text-2xl font-black">Puntos</h2><ul class="rounded-2xl bg-white divide-y divide-slate-200"><li class="py-3 border-b border-slate-200 last:border-0" th:each="point : ${points}"><strong th:text="${point.name}"></strong> · <span th:text="${point.type}"></span></li></ul></div></div></div>
            <div><div class="card plantio-card"><div class="card-body"><h2 class="text-2xl font-black">Sensores</h2><ul class="rounded-2xl bg-white divide-y divide-slate-200"><li class="py-3 border-b border-slate-200 last:border-0" th:each="sensor : ${sensors}"><strong th:text="${sensor.name}"></strong> · <span th:text="${sensor.value} + ' ' + ${sensor.unit}"></span> · <span th:text="${sensor.status}"></span></li></ul></div></div></div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    const mapPoints = /*[[${points}]]*/ [];
    const sensorReadings = /*[[${sensors}]]*/ [];
    window.plantioMapData = {points: mapPoints, sensors: sensorReadings};
    /*]]>*/
</script>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
