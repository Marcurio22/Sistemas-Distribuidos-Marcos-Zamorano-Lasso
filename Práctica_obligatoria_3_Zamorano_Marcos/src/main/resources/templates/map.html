<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Visor cartográfico')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="container-fluid py-4">
    <div class="container mb-3">
        <div class="section-title"><div><h1>Visor cartográfico</h1><p class="text-muted mb-0">Leaflet + OpenStreetMap. Sin API keys. Incluye puntos de interés y sensores simulados.</p></div>
        <form th:action="@{/sensors/sync}" method="post"><button class="btn btn-warning">Sincronizar sensores Flask</button></form></div>
    </div>
    <div id="plantioMap"></div>
    <div class="container mt-4">
        <div class="row g-4">
            <div class="col-lg-6"><div class="card plantio-card"><div class="card-body"><h2 class="h4">Puntos</h2><ul class="list-group list-group-flush"><li class="list-group-item" th:each="point : ${points}"><strong th:text="${point.name}"></strong> · <span th:text="${point.type}"></span></li></ul></div></div></div>
            <div class="col-lg-6"><div class="card plantio-card"><div class="card-body"><h2 class="h4">Sensores</h2><ul class="list-group list-group-flush"><li class="list-group-item" th:each="sensor : ${sensors}"><strong th:text="${sensor.name}"></strong> · <span th:text="${sensor.value} + ' ' + ${sensor.unit}"></span> · <span th:text="${sensor.status}"></span></li></ul></div></div></div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    const mapPoints = /*[[${points}]]*/ [];
    const sensorReadings = /*[[${sensors}]]*/ [];
    window.plantioMapData = {points: mapPoints, sensors: sensorReadings};
    /*]]>*/
</script>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
