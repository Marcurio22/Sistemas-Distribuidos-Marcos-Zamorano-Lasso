<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Mis entradas')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="app-shell py-10">
    <h1>Mis entradas</h1>
    <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        <div th:each="ticket : ${tickets}">
            <div class="ticket-card"><span class="badge badge-ghost">QR simulado</span><h2 class="text-xl font-black mt-3" th:text="'Burgos CF vs ' + ${ticket.match.rival}"></h2><p th:text="${ticket.zone} + ' · Asiento ' + ${ticket.seatCode}"></p><code th:text="${ticket.qrCode}"></code></div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
