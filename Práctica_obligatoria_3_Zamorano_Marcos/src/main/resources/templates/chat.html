<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/common :: head('Muro Blanquinegro')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="app-shell py-10">
    <section class="mb-6">
        <p class="uppercase tracking-[.22em] text-sm font-black text-plantio-green">Chat en directo</p>
        <h1 class="text-4xl md:text-5xl font-black tracking-tight">Muro Blanquinegro</h1>
        <p class="mt-2 text-lg leading-8 text-slate-700">Chat en tiempo real con WebSockets, SockJS y STOMP.</p>
    </section>
    <div id="chatMessages" class="chat-box mb-3">
        <div th:each="message : ${messages}" class="chat-message chat-message-grid" th:data-message-id="${message.id}">
            <div>
                <div class="chat-meta">
                    <strong th:text="${message.displayName}">Aficionado</strong>
                    <time th:datetime="${message.createdAt}" th:text="${#temporals.format(message.createdAt, 'dd/MM/yyyy HH:mm')}">03/06/2026 18:34</time>
                </div>
                <span th:text="${message.content}">Mensaje</span>
            </div>
            <form sec:authorize="hasRole('ADMIN')" th:action="@{/chat/{id}/delete(id=${message.id})}" method="post" class="chat-delete-form">
                <button class="btn btn-xs btn-error btn-outline" type="submit" title="Eliminar mensaje">Eliminar</button>
            </form>
        </div>
    </div>
    <div class="join w-full"><input id="chatInput" class="input input-bordered w-full" placeholder="Escribe un mensaje"><button id="sendChat" class="btn btn-primary">Enviar</button></div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<script th:inline="javascript">
    window.plantioChatUser = /*[[${chatDisplayName}]]*/ 'Aficionado Blanquinegro';
</script>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
