<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="app-shell py-10">
<h1>Jugador</h1><form th:action="@{/admin/players}" th:object="${item}" method="post" class="card plantio-card p-6"><input type="hidden" th:field="*{id}"><label>Nombre</label><input class="input input-bordered w-full mb-2" th:field="*{name}" required><label>Dorsal</label><input class="input input-bordered w-full mb-2" th:field="*{dorsal}" type="number"><label>Posición</label><input class="input input-bordered w-full mb-2" th:field="*{position}"><label>Nacionalidad</label><input class="input input-bordered w-full mb-2" th:field="*{nationality}"><label>Edad</label><input class="input input-bordered w-full mb-2" th:field="*{age}" type="number"><label>Altura</label><input class="input input-bordered w-full mb-2" th:field="*{height}"><label>Peso</label><input class="input input-bordered w-full mb-2" th:field="*{weight}"><label>Imagen</label><input class="input input-bordered w-full mb-2" th:field="*{imageUrl}"><label>Descripción</label><textarea class="textarea textarea-bordered w-full mb-2" th:field="*{description}"></textarea><label>Estado</label><input class="input input-bordered w-full mb-2" th:field="*{status}"><label>Goles</label><input class="input input-bordered w-full mb-2" th:field="*{goals}" type="number"><label>Asistencias</label><input class="input input-bordered w-full mb-3" th:field="*{assists}" type="number"><button class="btn btn-primary">Guardar</button></form>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
