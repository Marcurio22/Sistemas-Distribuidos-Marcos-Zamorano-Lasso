<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin · Jugador')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="app-shell py-10">
    <div th:replace="~{fragments/common :: backLink('/admin/players', 'Volver a jugadores')}"></div>
    <section class="admin-form-card">
        <div class="admin-form-heading">
            <p>Administración</p>
            <h1>Jugador</h1>
            <span>Completa ficha deportiva, dorsal disponible e imagen de perfil.</span>
        </div>
        <form th:action="@{/admin/players}" th:object="${item}" method="post" enctype="multipart/form-data" class="admin-form-grid">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{imageUrl}">
            <div class="md:col-span-2">
                <label class="field-label">Nombre</label>
                <input class="input input-bordered w-full" th:field="*{name}" required placeholder="Nombre del jugador">
            </div>
            <div>
                <label class="field-label">Dorsal disponible</label>
                <select class="select select-bordered w-full" th:field="*{dorsal}" required>
                    <option value="">Selecciona dorsal</option>
                    <option th:each="dorsal : ${availableDorsals}" th:value="${dorsal}" th:text="${dorsal}">1</option>
                </select>
            </div>
            <div>
                <label class="field-label">Posición</label>
                <select class="select select-bordered w-full" th:field="*{position}">
                    <option th:each="position : ${positions}" th:value="${position}" th:text="${position}">Delantero</option>
                </select>
            </div>
            <div>
                <label class="field-label">Nacionalidad</label>
                <input class="input input-bordered w-full" th:field="*{nationality}" placeholder="España">
            </div>
            <div>
                <label class="field-label">Estado</label>
                <select class="select select-bordered w-full" th:field="*{status}">
                    <option th:each="status : ${playerStatuses}" th:value="${status}" th:text="${status}">DISPONIBLE</option>
                </select>
            </div>
            <div class="grid grid-cols-3 gap-3 md:col-span-2">
                <div><label class="field-label">Edad</label><input class="input input-bordered w-full" th:field="*{age}" type="number" min="16" max="60"></div>
                <div><label class="field-label">Altura</label><input class="input input-bordered w-full" th:field="*{height}" type="number" step="0.01" min="1.40" max="2.20" placeholder="1.80"></div>
                <div><label class="field-label">Peso</label><input class="input input-bordered w-full" th:field="*{weight}" type="number" step="0.1" min="45" max="120" placeholder="75"></div>
            </div>
            <div class="grid grid-cols-2 gap-3 md:col-span-2">
                <div><label class="field-label">Goles</label><input class="input input-bordered w-full" th:field="*{goals}" type="number" min="0"></div>
                <div><label class="field-label">Asistencias</label><input class="input input-bordered w-full" th:field="*{assists}" type="number" min="0"></div>
            </div>
            <div class="md:col-span-2">
                <label class="field-label">Imagen del jugador</label>
                <div class="admin-file-zone">
                    <input class="file-input file-input-bordered w-full" type="file" name="playerImage" accept="image/png,image/jpeg,image/webp,image/svg+xml" data-max-file-size="67108864">
                    <small>PNG, JPG, WEBP o SVG. Tamaño máximo 64MB.</small>
                    <div class="admin-current-image" th:if="${item.imageUrl != null and !#strings.isEmpty(item.imageUrl)}">
                        <img th:src="*{imageUrl}" alt="Imagen actual"><span th:text="*{imageUrl}">Ruta actual</span>
                    </div>
                </div>
            </div>
            <div class="md:col-span-2">
                <label class="field-label">Descripción</label>
                <textarea class="textarea textarea-bordered w-full min-h-32" th:field="*{description}" placeholder="Descripción deportiva del jugador"></textarea>
            </div>
            <div class="admin-form-actions md:col-span-2">
                <a class="btn btn-outline btn-primary" th:href="@{/admin/players}">Cancelar</a>
                <button class="btn btn-primary" type="submit">Guardar jugador</button>
            </div>
        </form>
    </section>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
