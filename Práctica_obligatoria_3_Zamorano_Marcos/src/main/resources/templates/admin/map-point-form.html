<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="app-shell py-10">
<h1>Punto del mapa</h1><form th:action="@{/admin/map-points}" th:object="${item}" method="post" class="card plantio-card p-6"><input type="hidden" th:field="*{id}"><label>Nombre</label><input class="input input-bordered w-full mb-2" th:field="*{name}"><label>Tipo</label><input class="input input-bordered w-full mb-2" th:field="*{type}"><label>Latitud</label><input class="input input-bordered w-full mb-2" th:field="*{latitude}"><label>Longitud</label><input class="input input-bordered w-full mb-2" th:field="*{longitude}"><label>Descripción</label><textarea class="textarea textarea-bordered w-full mb-3" th:field="*{description}"></textarea><button class="btn btn-primary">Guardar</button></form>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
