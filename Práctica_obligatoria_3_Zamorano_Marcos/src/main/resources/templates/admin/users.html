<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="app-shell py-10">
<div class="section-title"><h1>Usuarios</h1><a class="btn btn-primary" th:href="@{/admin/users/new}">Nuevo</a></div>
<table class="table table-zebra"><thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Activo</th><th></th></tr></thead><tbody>
<tr th:each="item : ${items}"><td th:text="${item.id}"></td><td th:text="${item.fullName}"></td><td th:text="${item.email}"></td><td th:text="${item.role}"></td><td th:text="${item.enabled}"></td><td><a class="btn btn-sm btn-outline btn-primary" th:href="@{/admin/users/{id}/edit(id=${item.id})}">Editar</a></td></tr>
</tbody></table>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
