<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin · Usuarios')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="app-shell py-10">
    <div th:replace="~{fragments/common :: backLink('/admin', 'Volver al panel de administración')}"></div>
    <div class="section-title admin-list-title">
        <div>
            <p class="uppercase tracking-[.22em] text-sm font-black text-plantio-green">Administración</p>
            <h1 class="text-4xl font-black tracking-tight">Usuarios</h1>
        </div>
        <div class="admin-actions">
            <a class="btn btn-outline btn-success admin-export-btn" th:href="@{/admin/users/export.csv}"><span class="admin-export-icon">▣</span>Exportar CSV</a>
            <a class="btn btn-outline btn-error admin-export-btn" th:href="@{/admin/users/export.pdf}"><span class="admin-export-icon">▤</span>Exportar PDF</a>
            <a class="btn btn-primary" th:href="@{/admin/users/new}">Nuevo</a>
        </div>
    </div>
    <div class="overflow-x-auto rounded-3xl bg-white/90 shadow-xl border border-slate-200">
        <table class="table table-zebra admin-table"><thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Activo</th><th>Acciones</th></tr></thead><tbody>
        <tr th:each="item : ${items}"><td th:text="${item.id}"></td><td th:text="${item.fullName}"></td><td th:text="${item.email}"></td><td th:text="${item.role}"></td><td><span class="badge" th:classappend="${item.enabled} ? ' badge-success' : ' badge-error'" th:text="${item.enabled} ? 'Sí' : 'No'"></span></td><td class="admin-row-actions"><a class="btn btn-sm btn-outline btn-primary" th:href="@{/admin/users/{id}/edit(id=${item.id})}">Editar</a><form th:action="@{/admin/users/{id}/delete(id=${item.id})}" method="post" data-confirm="¿Eliminar usuario?"><button class="btn btn-sm btn-outline btn-error" type="submit">Eliminar</button></form></td></tr>
        </tbody></table>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
