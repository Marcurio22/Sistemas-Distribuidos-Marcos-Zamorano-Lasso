<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="container py-5">
<h1>Sensor</h1><form th:action="@{/admin/sensors}" th:object="${item}" method="post" class="card plantio-card p-4"><input type="hidden" th:field="*{id}"><label>Nombre</label><input class="form-control mb-2" th:field="*{name}"><label>Tipo</label><input class="form-control mb-2" th:field="*{type}"><label>Valor</label><input class="form-control mb-2" th:field="*{value}"><label>Unidad</label><input class="form-control mb-2" th:field="*{unit}"><label>Estado</label><input class="form-control mb-2" th:field="*{status}"><label>Latitud</label><input class="form-control mb-2" th:field="*{latitude}"><label>Longitud</label><input class="form-control mb-3" th:field="*{longitude}"><button class="btn btn-primary">Guardar</button></form>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
