<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="app-shell py-10">
    <h1>Panel de administración</h1>
    <p class="text-lg leading-8 text-slate-700">Mantenimiento completo de usuarios, jugadores, partidos, productos, mapa, sensores, FAQs, pedidos y logs IA.</p>

    <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-4 mb-8">
        <a class="admin-metric-tile" th:href="@{/admin/users}">
            <span>
                <span class="block text-sm font-bold text-slate-500">Usuarios</span>
                <strong class="admin-metric-value" th:text="${users}">0</strong>
            </span>
            <span class="admin-metric-icon bg-blue-100 text-blue-700">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </span>
        </a>
        <a class="admin-metric-tile" th:href="@{/admin/players}">
            <span>
                <span class="block text-sm font-bold text-slate-500">Jugadores</span>
                <strong class="admin-metric-value" th:text="${players}">0</strong>
            </span>
            <span class="admin-metric-icon bg-emerald-100 text-emerald-700">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="m12 3 3 6-3 3-3-3 3-6Z"/><path d="m4.6 16.5 6.4-.8 1 5.9"/><path d="m19.4 16.5-6.4-.8-1 5.9"/></svg>
            </span>
        </a>
        <a class="admin-metric-tile" th:href="@{/admin/matches}">
            <span>
                <span class="block text-sm font-bold text-slate-500">Partidos</span>
                <strong class="admin-metric-value" th:text="${matches}">0</strong>
            </span>
            <span class="admin-metric-icon bg-slate-100 text-slate-700">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            </span>
        </a>
        <a class="admin-metric-tile" th:href="@{/admin/products}">
            <span>
                <span class="block text-sm font-bold text-slate-500">Productos</span>
                <strong class="admin-metric-value" th:text="${products}">0</strong>
            </span>
            <span class="admin-metric-icon bg-green-100 text-green-700">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h7.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            </span>
        </a>
    </div>

    <div class="flex flex-wrap gap-2">
        <a class="btn btn-outline btn-primary" th:href="@{/admin/map-points}">Puntos mapa</a>
        <a class="btn btn-outline btn-primary" th:href="@{/admin/sensors}">Sensores</a>
        <a class="btn btn-outline btn-primary" th:href="@{/admin/faqs}">FAQs</a>
        <a class="btn btn-outline btn-primary" th:href="@{/admin/orders}">Pedidos</a>
        <a class="btn btn-outline btn-primary" th:href="@{/admin/assistant-logs}">Logs IA</a>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
