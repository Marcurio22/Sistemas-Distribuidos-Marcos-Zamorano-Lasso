<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="app-shell py-10">
<div th:replace="~{fragments/common :: backLink('/admin', 'Volver al panel de administración')}"></div>
<h1>Usuario</h1><form th:action="@{/admin/users}" th:object="${item}" method="post" class="card plantio-card p-6">
<input type="hidden" th:field="*{id}">
<label>Nombre</label><input class="input input-bordered w-full mb-2" th:field="*{firstName}" required>
<label>Apellidos</label><input class="input input-bordered w-full mb-2" th:field="*{lastName}" required>
<label>Email</label><input class="input input-bordered w-full mb-2" th:field="*{email}" required>
<label>Contraseña</label><input class="input input-bordered w-full mb-2" th:field="*{password}" type="password" placeholder="Vacío conserva la actual">
<label>Rol</label><select class="select select-bordered w-full mb-2" th:field="*{role}"><option>ROLE_USER</option><option>ROLE_ADMIN</option></select>
<label>Teléfono</label><input class="input input-bordered w-full mb-2" th:field="*{phone}">
<div class="flex items-center gap-3 mb-3"><input class="checkbox checkbox-primary" type="checkbox" th:field="*{enabled}"><label class="font-semibold text-slate-700">Activo</label></div>
<button class="btn btn-primary">Guardar</button></form>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
