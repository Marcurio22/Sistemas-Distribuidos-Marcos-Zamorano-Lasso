<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="container py-5">
<h1>Producto</h1><form th:action="@{/admin/products}" th:object="${item}" method="post" class="card plantio-card p-4"><input type="hidden" th:field="*{id}"><label>Nombre</label><input class="form-control mb-2" th:field="*{name}" required><label>Descripción</label><textarea class="form-control mb-2" th:field="*{description}"></textarea><label>Precio</label><input class="form-control mb-2" th:field="*{price}"><label>Stock</label><input class="form-control mb-2" th:field="*{stock}" type="number"><label>Categoría</label><input class="form-control mb-2" th:field="*{category}"><label>Imagen</label><input class="form-control mb-2" th:field="*{imageUrl}"><div class="form-check mb-3"><input class="form-check-input" type="checkbox" th:field="*{active}"><label class="form-check-label">Activo</label></div><button class="btn btn-primary">Guardar</button></form>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
