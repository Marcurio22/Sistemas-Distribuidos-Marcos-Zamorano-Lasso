<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="container py-5">
<h1>FAQ</h1><form th:action="@{/admin/faqs}" th:object="${item}" method="post" class="card plantio-card p-4"><input type="hidden" th:field="*{id}"><label>Pregunta</label><input class="form-control mb-2" th:field="*{question}"><label>Respuesta</label><textarea class="form-control mb-2" th:field="*{answer}"></textarea><label>Categoría</label><input class="form-control mb-2" th:field="*{category}"><div class="form-check mb-3"><input class="form-check-input" type="checkbox" th:field="*{active}"><label class="form-check-label">Activa</label></div><button class="btn btn-primary">Guardar</button></form>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
