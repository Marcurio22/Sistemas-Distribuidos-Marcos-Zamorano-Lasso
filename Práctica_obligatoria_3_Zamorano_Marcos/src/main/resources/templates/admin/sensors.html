<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin · Sensores')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="app-shell py-10">
    <div th:replace="~{fragments/common :: backLink('/admin', 'Volver al panel de administración')}"></div>
    <div class="section-title admin-list-title"><div><p class="uppercase tracking-[.22em] text-sm font-black text-plantio-green">Administración</p><h1 class="text-4xl font-black tracking-tight">Sensores</h1></div><div class="admin-actions"><a class="btn btn-outline btn-success admin-export-btn" th:href="@{/admin/sensors/export.csv}"><span class="admin-export-icon">▣</span>Exportar CSV</a><a class="btn btn-outline btn-error admin-export-btn" th:href="@{/admin/sensors/export.pdf}"><span class="admin-export-icon">▤</span>Exportar PDF</a><a class="btn btn-primary" th:href="@{/admin/sensors/new}">Nuevo</a></div></div>
    <div class="overflow-x-auto rounded-3xl bg-white/90 shadow-xl border border-slate-200"><table class="table table-zebra admin-table"><thead><tr><th>Nombre</th><th>Tipo</th><th>Valor</th><th>Estado</th><th>Fecha</th><th>Acciones</th></tr></thead><tbody><tr th:each="item : ${items}"><td th:text="${item.name}"></td><td th:text="${item.type}"></td><td th:text="|${item.value} ${item.unit}|"></td><td><span class="badge badge-outline" th:text="${item.status}"></span></td><td th:text="${#temporals.format(item.capturedAt, 'dd/MM HH:mm')}"></td><td class="admin-row-actions"><a class="btn btn-sm btn-outline btn-primary" th:href="@{/admin/sensors/{id}/edit(id=${item.id})}">Editar</a><form th:action="@{/admin/sensors/{id}/delete(id=${item.id})}" method="post" data-confirm="¿Eliminar sensor?"><button class="btn btn-sm btn-outline btn-error" type="submit">Eliminar</button></form></td></tr></tbody></table></div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
