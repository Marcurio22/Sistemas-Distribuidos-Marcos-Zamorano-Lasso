<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="container py-5">
<div class="section-title"><h1>Sensores</h1><a class="btn btn-primary" th:href="@{/admin/sensors/new}">Nuevo</a></div><table class="table table-hover"><thead><tr><th>Nombre</th><th>Tipo</th><th>Valor</th><th>Estado</th><th>Fecha</th></tr></thead><tbody><tr th:each="item : ${items}"><td th:text="${item.name}"></td><td th:text="${item.type}"></td><td th:text="${item.value} + ' ' + ${item.unit}"></td><td th:text="${item.status}"></td><td th:text="${#temporals.format(item.capturedAt, 'dd/MM HH:mm')}"></td></tr></tbody></table>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
