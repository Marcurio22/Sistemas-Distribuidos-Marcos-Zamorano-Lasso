<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="container py-5">
<h1>Partido</h1><form th:action="@{/admin/matches}" th:object="${item}" method="post" class="card plantio-card p-4"><input type="hidden" th:field="*{id}"><label>Rival</label><input class="form-control mb-2" th:field="*{rival}" required><label>Competición</label><input class="form-control mb-2" th:field="*{competition}"><label>Fecha</label><input class="form-control mb-2" th:field="*{matchDate}" type="datetime-local"><label>Estadio</label><input class="form-control mb-2" th:field="*{stadium}"><label>Precio base</label><input class="form-control mb-2" th:field="*{basePrice}"><label>Entradas</label><input class="form-control mb-2" th:field="*{availableTickets}" type="number"><label>Estado</label><input class="form-control mb-2" th:field="*{status}"><label>Imagen</label><input class="form-control mb-3" th:field="*{imageUrl}"><button class="btn btn-primary">Guardar</button></form>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
