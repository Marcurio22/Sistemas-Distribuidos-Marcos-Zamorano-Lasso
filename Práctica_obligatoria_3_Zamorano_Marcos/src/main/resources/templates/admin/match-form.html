<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin · Partido')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="app-shell py-10">
    <div th:replace="~{fragments/common :: backLink('/admin/matches', 'Volver a partidos')}"></div>
    <section class="admin-form-card">
        <div class="admin-form-heading">
            <p>Administración</p>
            <h1>Partido</h1>
            <span>Configura rival, competición, localía, precio, entradas y escudo del equipo contrario.</span>
        </div>
        <form th:action="@{/admin/matches}" th:object="${item}" method="post" enctype="multipart/form-data" class="admin-form-grid">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{imageUrl}">
            <div>
                <label class="field-label">Rival</label>
                <input class="input input-bordered w-full" th:field="*{rival}" required placeholder="Ej: Real Zaragoza">
            </div>
            <div>
                <label class="field-label">Competición</label>
                <select class="select select-bordered w-full" th:field="*{competition}" required>
                    <option th:each="competition : ${competitions}" th:value="${competition}" th:text="${competition}">LaLiga Hypermotion</option>
                </select>
            </div>
            <div>
                <label class="field-label">Fecha y hora</label>
                <input class="input input-bordered w-full" th:field="*{matchDateValue}" type="datetime-local" required>
            </div>
            <div>
                <label class="field-label">Estadio</label>
                <input class="input input-bordered w-full" th:field="*{stadium}" placeholder="El Plantío">
            </div>
            <div class="grid grid-cols-2 gap-3 md:col-span-2">
                <div><label class="field-label">Precio base</label><input class="input input-bordered w-full" th:field="*{basePrice}" type="number" step="0.01" min="0" required></div>
                <div><label class="field-label">Entradas</label><input class="input input-bordered w-full" th:field="*{availableTickets}" type="number" min="0" required></div>
            </div>
            <div>
                <label class="field-label">Estado</label>
                <select class="select select-bordered w-full" th:field="*{status}">
                    <option value="PROGRAMADO">Programado</option>
                    <option value="JUGADO">Jugado</option>
                    <option value="CANCELADO">Cancelado</option>
                </select>
            </div>
            <div>
                <label class="field-label">Localía del Burgos CF</label>
                <select class="select select-bordered w-full" th:field="*{homeGame}">
                    <option th:value="true">Burgos CF local</option>
                    <option th:value="false">Burgos CF visitante</option>
                </select>
            </div>
            <div class="md:col-span-2">
                <label class="field-label">Escudo del equipo rival</label>
                <div class="admin-file-zone">
                    <input class="file-input file-input-bordered w-full" type="file" name="opponentLogo" accept="image/png,image/jpeg,image/webp,image/svg+xml" data-max-file-size="67108864">
                    <small>PNG, JPG, WEBP o SVG. Tamaño máximo 64MB. Si no subes imagen se usará un escudo por defecto.</small>
                    <div class="admin-current-image" th:if="${item.imageUrl != null and !#strings.isEmpty(item.imageUrl)}">
                        <img th:src="*{imageUrl}" alt="Escudo actual"><span th:text="*{imageUrl}">Ruta actual</span>
                    </div>
                </div>
            </div>
            <div class="admin-form-actions md:col-span-2">
                <a class="btn btn-outline btn-primary" th:href="@{/admin/matches}">Cancelar</a>
                <button class="btn btn-primary" type="submit">Guardar partido</button>
            </div>
        </form>
    </section>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
