<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin · Partido')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="app-shell py-10">
    <div th:replace="~{fragments/common :: backLink('/admin/matches', 'Volver a partidos')}"></div>
    <section class="card plantio-card max-w-5xl mx-auto">
        <div class="card-body p-6 md:p-8">
            <p class="uppercase tracking-[.22em] text-sm font-black text-plantio-green">Administración</p>
            <h1 class="text-4xl font-black tracking-tight mb-4">Partido</h1>
            <form th:action="@{/admin/matches}" th:object="${item}" method="post" enctype="multipart/form-data" class="grid gap-5 md:grid-cols-2">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{imageUrl}">
                <div>
                    <label class="field-label">Rival</label>
                    <input class="input input-bordered w-full" th:field="*{rival}" required placeholder="Ej: Real Zaragoza">
                </div>
                <div>
                    <label class="field-label">Competición</label>
                    <select class="select select-bordered w-full" th:field="*{competition}" required>
                        <option value="LaLiga Hypermotion">LaLiga Hypermotion</option>
                        <option value="Copa del Rey">Copa del Rey</option>
                    </select>
                </div>
                <div>
                    <label class="field-label">Fecha</label>
                    <input class="input input-bordered w-full" th:field="*{matchDate}" type="datetime-local" required>
                </div>
                <div>
                    <label class="field-label">Estadio</label>
                    <input class="input input-bordered w-full" th:field="*{stadium}" placeholder="El Plantío">
                </div>
                <div>
                    <label class="field-label">Precio base</label>
                    <input class="input input-bordered w-full" th:field="*{basePrice}" type="number" step="0.01" min="0" required>
                </div>
                <div>
                    <label class="field-label">Entradas</label>
                    <input class="input input-bordered w-full" th:field="*{availableTickets}" type="number" min="0" required>
                </div>
                <div>
                    <label class="field-label">Estado</label>
                    <select class="select select-bordered w-full" th:field="*{status}">
                        <option value="PROGRAMADO">Programado</option>
                        <option value="JUGADO">Jugado</option>
                        <option value="CANCELADO">Cancelado</option>
                    </select>
                </div>
                <div>
                    <label class="field-label">Localía del Burgos CF</label>
                    <select class="select select-bordered w-full" th:field="*{homeGame}">
                        <option th:value="true">Burgos CF local</option>
                        <option th:value="false">Burgos CF visitante</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="field-label">Escudo del equipo rival</label>
                    <input class="file-input file-input-bordered w-full" type="file" name="opponentLogo" accept="image/png,image/jpeg,image/webp,image/svg+xml">
                    <small class="auth-help">Si no subes imagen, se mostrará un escudo SVG por defecto. El archivo queda guardado en /uploads/teams.</small>
                    <div class="mt-3 flex items-center gap-3" th:if="*{imageUrl != null}">
                        <img class="w-14 h-14 object-contain rounded-full bg-slate-100 p-2" th:src="*{imageUrl}" alt="Escudo actual">
                        <span class="text-sm text-slate-500" th:text="*{imageUrl}">Ruta actual</span>
                    </div>
                </div>
                <div class="md:col-span-2 flex justify-end gap-3">
                    <a class="btn btn-outline btn-primary" th:href="@{/admin/matches}">Cancelar</a>
                    <button class="btn btn-primary" type="submit">Guardar partido</button>
                </div>
            </form>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
