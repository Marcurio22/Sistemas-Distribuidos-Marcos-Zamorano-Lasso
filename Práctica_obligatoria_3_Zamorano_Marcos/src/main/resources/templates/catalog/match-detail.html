<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Compra de entrada')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-7"><div class="card plantio-card"><div class="card-body p-4">
            <span class="badge text-bg-primary" th:text="${match.competition}">Competición</span>
            <h1 class="mt-3" th:text="'Burgos CF vs ' + ${match.rival}">Partido</h1>
            <p class="lead" th:text="${#temporals.format(match.matchDate, 'dd/MM/yyyy HH:mm')} + ' · ' + ${match.stadium}">Fecha</p>
            <p>Entradas disponibles: <strong th:text="${match.availableTickets}">0</strong></p>
            <p>Precio base: <strong th:text="${match.basePrice} + ' €'">0</strong></p>
        </div></div></div>
        <div class="col-lg-5"><div class="card plantio-card"><div class="card-body p-4">
            <h2 class="h4">Pasarela simulada</h2>
            <form th:action="@{/checkout/ticket/{id}(id=${match.id})}" th:object="${checkout}" method="post">
                <label class="form-label">Zona</label><select class="form-select mb-3" th:field="*{zone}"><option>Lateral</option><option>Fondo Norte</option><option>Tribuna</option><option>Zona joven</option></select>
                <label class="form-label">Titular</label><input class="form-control mb-3" th:field="*{cardHolder}" required placeholder="Marcos Zamorano">
                <label class="form-label">Tarjeta ficticia</label><input class="form-control mb-3" th:field="*{cardNumber}" value="4242424242424242" required>
                <div class="row"><div class="col"><label class="form-label">Caducidad</label><input class="form-control mb-3" th:field="*{expiry}" placeholder="12/30"></div><div class="col"><label class="form-label">CVV</label><input class="form-control mb-3" th:field="*{cvv}" placeholder="123"></div></div>
                <button class="btn btn-warning w-100">Confirmar compra</button>
            </form>
        </div></div></div>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
