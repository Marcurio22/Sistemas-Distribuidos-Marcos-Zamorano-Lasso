<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Partidos')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<main class="app-shell py-10">
    <div class="section-title"><h1>Próximos partidos</h1><span class="badge badge-accent">Compra simulada</span></div>
    <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        <div th:each="match : ${matches}">
            <div class="card plantio-card h-full"><div class="card-body">
                <span class="badge badge-primary" th:text="${match.competition}">Competición</span>
                <h2 class="text-2xl font-black mt-3" th:text="'Burgos CF vs ' + ${match.rival}">Partido</h2>
                <p th:text="${#temporals.format(match.matchDate, 'dd/MM/yyyy HH:mm')}">Fecha</p>
                <p><strong th:text="${match.basePrice} + ' €'"></strong> · <span th:text="${match.availableTickets} + ' entradas'"></span></p>
                <a class="btn btn-primary" th:href="@{/matches/{id}(id=${match.id})}">Comprar entrada</a>
            </div></div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
