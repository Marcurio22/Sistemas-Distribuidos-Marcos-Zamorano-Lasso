<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Partidos')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: alerts}"></div>
<main class="app-shell py-10">
    <section class="mb-8">
        <p class="uppercase tracking-[.22em] text-sm font-black text-plantio-green">Calendario</p>
        <h1 class="text-4xl md:text-5xl font-black tracking-tight">Próximos partidos</h1>
        <p class="mt-3 text-lg leading-8 text-slate-700 max-w-3xl">Compra entradas simuladas y consulta competición, escudos, fecha, estadio y disponibilidad.</p>
    </section>
    <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
        <article th:each="match : ${matches}" class="match-card"
                 th:classappend="${#strings.contains(#strings.toLowerCase(match.competition), 'copa')} ? ' match-card-copa' : ' match-card-laliga'">
            <div class="match-competition-row">
                <span class="match-competition-badge">
                    <img th:src="${#strings.contains(#strings.toLowerCase(match.competition), 'copa')} ? @{/images/competitions/copa-del-rey.png} : @{/images/competitions/laliga-hypermotion.png}" th:alt="${match.competition}">
                    <span th:text="${match.competition}">Competición</span>
                </span>
            </div>
            <div class="match-teams">
                <div class="match-team" th:if="${match.homeGame == null or match.homeGame}">
                    <img th:src="@{/images/burgos-cf-shield.png}" alt="Burgos CF"><span>Burgos CF</span>
                </div>
                <div class="match-team" th:unless="${match.homeGame == null or match.homeGame}">
                    <img th:src="${match.imageUrl ?: '/images/team-default-shield.svg'}" th:alt="${match.rival}"><span th:text="${match.rival}">Rival</span>
                </div>
                <strong class="match-versus">VS</strong>
                <div class="match-team" th:if="${match.homeGame == null or match.homeGame}">
                    <img th:src="${match.imageUrl ?: '/images/team-default-shield.svg'}" th:alt="${match.rival}"><span th:text="${match.rival}">Rival</span>
                </div>
                <div class="match-team" th:unless="${match.homeGame == null or match.homeGame}">
                    <img th:src="@{/images/burgos-cf-shield.png}" alt="Burgos CF"><span>Burgos CF</span>
                </div>
            </div>
            <h2 class="match-title">
                <a class="plantio-link-hover" th:href="@{/matches/{id}(id=${match.id})}"
                   th:text="${(match.homeGame == null or match.homeGame) ? 'Burgos CF vs ' + match.rival : match.rival + ' vs Burgos CF'}">Partido</a>
            </h2>
            <div class="match-data-grid">
                <div><span>Fecha</span><strong th:text="${#temporals.format(match.matchDate, 'dd/MM/yyyy HH:mm')}">Fecha</strong></div>
                <div><span>Estadio</span><strong th:text="${match.stadium}">El Plantío</strong></div>
                <div><span>Precio</span><strong th:text="${match.basePrice} + ' €'">25 €</strong></div>
                <div><span>Entradas</span><strong th:text="${match.availableTickets}">5000</strong></div>
            </div>
            <a class="btn btn-primary w-full mt-4" th:href="@{/matches/{id}(id=${match.id})}">Comprar entrada</a>
        </article>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
