<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Tienda')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<main class="app-shell py-10">
    <div class="section-title"><h1>Tienda blanquinegra</h1></div>
    <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        <div th:each="product : ${products}">
            <div class="card plantio-card h-full"><div class="card-body">
                <img class="product-img mb-3" th:src="${product.imageUrl}" alt="Producto">
                <div class="flex items-start justify-between gap-3">
                    <h2 class="text-xl font-black" th:text="${product.name}">Producto</h2>
                    <span th:if="${product.name == 'Pack día de partido'}" class="badge badge-accent whitespace-nowrap">Oferta limitada</span>
                </div>
                <p th:text="${product.description}">Descripción</p>
                <p><strong th:text="${product.price} + ' €'"></strong> · Stock <span th:text="${product.stock}"></span></p>
                <a class="btn btn-primary" th:href="@{/shop/{id}(id=${product.id})}">Comprar</a>
            </div></div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
