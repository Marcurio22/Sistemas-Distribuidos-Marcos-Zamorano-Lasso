<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Jugadores')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<main class="app-shell py-10">
    <div class="section-title"><h1>Plantilla</h1><span class="badge badge-primary">CRUD público + admin</span></div>
    <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        <div  th:each="player : ${players}">
            <div class="card plantio-card h-full text-center"><div class="card-body">
                <img class="avatar mb-3" th:src="${player.imageUrl}" alt="Jugador">
                <h2 class="text-xl font-black" th:text="${player.name}">Nombre</h2>
                <p class="text-slate-500" th:text="'#' + ${player.dorsal} + ' · ' + ${player.position}">Dorsal</p>
                <p><span class="badge badge-success" th:text="${player.status}">Estado</span></p>
                <a class="btn btn-outline btn-primary" th:href="@{/players/{id}(id=${player.id})}">Ver ficha</a>
            </div></div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
