<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Jugadores')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<main class="container py-5">
    <div class="section-title"><h1>Plantilla</h1><span class="badge text-bg-primary">CRUD público + admin</span></div>
    <div class="row g-4">
        <div class="col-md-4 col-lg-3" th:each="player : ${players}">
            <div class="card plantio-card h-100 text-center"><div class="card-body">
                <img class="avatar mb-3" th:src="${player.imageUrl}" alt="Jugador">
                <h2 class="h5" th:text="${player.name}">Nombre</h2>
                <p class="text-muted" th:text="'#' + ${player.dorsal} + ' · ' + ${player.position}">Dorsal</p>
                <p><span class="badge text-bg-success" th:text="${player.status}">Estado</span></p>
                <a class="btn btn-outline-primary" th:href="@{/players/{id}(id=${player.id})}">Ver ficha</a>
            </div></div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
