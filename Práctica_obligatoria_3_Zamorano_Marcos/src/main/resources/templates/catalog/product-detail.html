<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(${product.name})}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<main class="app-shell py-10">
    <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        <div><div class="card plantio-card"><div class="card-body p-6">
            <img class="product-img mb-3" th:src="${product.imageUrl}" alt="Producto">
            <div class="flex items-start justify-between gap-3">
                <h1 th:text="${product.name}">Producto</h1>
                <span th:if="${product.name == 'Pack día de partido'}" class="badge badge-accent whitespace-nowrap">Oferta limitada</span>
            </div>
            <p class="text-lg leading-8 text-slate-700" th:text="${product.description}">Descripción</p>
            <p>Categoría: <strong th:text="${product.category}">Categoría</strong></p>
            <p>Precio: <strong th:text="${product.price} + ' €'"></strong></p>
        </div></div></div>
        <div><div class="card plantio-card"><div class="card-body p-6">
            <h2 class="text-2xl font-black">Checkout</h2>
            <form th:action="@{/checkout/product/{id}(id=${product.id})}" th:object="${checkout}" method="post">
                <label class="field-label">Cantidad</label><input class="input input-bordered w-full mb-3" th:field="*{quantity}" type="number" min="1" value="1">
                <label class="field-label">Titular</label><input class="input input-bordered w-full mb-3" th:field="*{cardHolder}" required>
                <label class="field-label">Tarjeta ficticia</label><input class="input input-bordered w-full mb-3" th:field="*{cardNumber}" value="4242424242424242" required>
                <div class="grid gap-5 md:grid-cols-2"><div><label class="field-label">Caducidad</label><input class="input input-bordered w-full mb-3" th:field="*{expiry}" placeholder="12/30"></div><div><label class="field-label">CVV</label><input class="input input-bordered w-full mb-3" th:field="*{cvv}" placeholder="123"></div></div>
                <button class="btn btn-accent w-full">Pagar pedido</button>
            </form>
        </div></div></div>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
<div th:replace="~{fragments/common :: scripts}"></div>
</body>
</html>
