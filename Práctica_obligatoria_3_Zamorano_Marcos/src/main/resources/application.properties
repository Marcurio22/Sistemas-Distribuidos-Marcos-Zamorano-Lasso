# -----------------------------------------------------------------------------
# El Plantio 360 - Configuracion Spring Boot
# Autor: Marcos Zamorano Lasso
# Practica 3 - Sistemas Distribuidos
# -----------------------------------------------------------------------------
spring.application.name=plantio360
server.port=${SERVER_PORT:8080}

# Base de datos MySQL en Docker.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/plantio360?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:plantio}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:plantio}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# Thymeleaf.
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# JWT manual HMAC-SHA256.
plantio.jwt.secret=${PLANTIO_JWT_SECRET:Plantio360SuperSecretKeyForAcademicProject2026ChangeMe}
plantio.jwt.expiration-seconds=${PLANTIO_JWT_EXPIRATION_SECONDS:86400}

# Redis cache.
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# RabbitMQ.
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:plantio}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:plantio}

# MailHog.
spring.mail.host=${MAIL_HOST:mailhog}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Microservicio Flask de sensores.
plantio.python-api.base-url=${PLANTIO_PYTHON_API_BASE_URL:http://python-api:5000}

# Gemini habilitado por defecto. La clave se lee desde .env o variables de entorno.
plantio.gemini.enabled=${PLANTIO_GEMINI_ENABLED:true}
plantio.gemini.model=${PLANTIO_GEMINI_MODEL:gemini-2.5-flash}
spring.ai.google.genai.api-key=${PLANTIO_GEMINI_API_KEY:}
plantio.gemini.api-key=${spring.ai.google.genai.api-key:}

# Actuator.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Evita que Spring Data Redis intente registrar repositorios JPA como repositorios Redis.
spring.data.redis.repositories.enabled=false

# Subidas desde administración: escudos de rivales y recursos visuales.
spring.servlet.multipart.max-file-size=64MB
spring.servlet.multipart.max-request-size=64MB
server.tomcat.max-swallow-size=64MB
server.tomcat.max-http-form-post-size=64MB

spring.servlet.multipart.enabled=true

spring.servlet.multipart.file-size-threshold=2MB
spring.servlet.multipart.resolve-lazily=true
spring.servlet.multipart.location=${JAVA_IO_TMPDIR:/tmp}